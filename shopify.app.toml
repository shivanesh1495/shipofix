# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "36e9a19a95668d505485fe62e5c6171a"
name = "Shipofix"
application_url = "https://shipofix-production.up.railway.app"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-07"

  [webhooks.privacy_compliance]
  customer_data_request_url = "https://shipofix-production.up.railway.app/webhooks/customers/data_request"
  customer_deletion_url = "https://shipofix-production.up.railway.app/webhooks/customers/redact"
  shop_deletion_url = "https://shipofix-production.up.railway.app/webhooks/shop/redact"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_shipping,write_metaobject_definitions,write_metaobjects,write_products,write_shipping"
optional_scopes = [ ]
use_legacy_install_flow = false

[auth]
redirect_urls = [
  "https://shipofix-production.up.railway.app/auth/callback",
  "https://shipofix-production.up.railway.app/auth/shopify/callback",
  "https://shipofix-production.up.railway.app/api/auth/callback"
]
